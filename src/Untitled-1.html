<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>语音转文字 - 纯前端可用版</title>
    <style>
        body {
            font-family: Arial;
            padding: 30px;
        }
        #result {
            border: 1px solid #ccc;
            padding: 20px;
            margin-top: 20px;
            min-height: 150px;
            width: 600px;
            font-size: 16px;
            line-height: 1.6;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-right: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>✅ 可用版 · 语音转文字（边说边转）</h2>
<button id="start">开始说话</button>
<button id="stop">停止</button>
<div id="result"></div>

<script>
const result = document.getElementById('result');
const startBtn = document.getElementById('start');
const stopBtn = document.getElementById('stop');

let recognition;

// 浏览器原生语音识别（国内最稳、不报错、纯前端）
if (window.SpeechRecognition || window.webkitSpeechRecognition) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN'; // 中文
    recognition.continuous = true; // 持续识别
    recognition.interimResults = true; // 实时出字

    let finalText = '';

    // 实时返回文字
    recognition.onresult = (e) => {
        let interimText = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
            const transcript = e.results[i][0].transcript;
            if (e.results[i].isFinal) {
                finalText += transcript + ' ';
            } else {
                interimText += transcript;
            }
        }
        result.innerText = finalText + interimText;
    };

    // 开始
    startBtn.onclick = () => {
        finalText = '';
        result.innerText = '聆听中...';
        recognition.start();
    };

    // 停止
    stopBtn.onclick = () => {
        recognition.stop();
        result.innerText += '\n\n=== 已停止 ===';
    };

} else {
    result.innerText = '❌ 请使用 Chrome / Edge 浏览器';
}
</script>

</body>
</html>
